<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简餐饮管理系统</title>
    <!-- Lucide 图标库 -->
    <script src="https://unpkg.zhimg.com/lucide@latest"></script>
    <style>
        /* -----------------------------------------
           完全内联手写精美极简样式系统 (零外部CSS依赖)
           ----------------------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #f8fafc;
            color: #334155;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 80px;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 统一阴影和渐变 */
        .card-shadow {
            box-shadow: 0 4px 12px -1px rgba(0, 0, 0, 0.03), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
        }
        .pop-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 1. 顶部导航栏 */
        header {
            position: sticky;
            top: 0;
            z-index: 40;
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #f1f5f9;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .menu-btn {
            background: none;
            border: none;
            padding: 8px;
            border-radius: 8px;
            color: #475569;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-btn:active {
            background-color: #f1f5f9;
        }
        .page-title {
            font-size: 18px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        /* 2. 侧边抽屉 (Drawer) */
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .drawer {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 280px;
            background-color: #ffffff;
            z-index: 51;
            box-shadow: 25px 0 50px -12px rgba(0, 0, 0, 0.25);
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .drawer-header {
            padding: 24px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-icon {
            background-color: #f59e0b;
            color: #ffffff;
            padding: 6px;
            border-radius: 8px;
            display: flex;
            align-items: center;
        }
        .brand-name {
            font-size: 18px;
            font-weight: 800;
            color: #0f172a;
        }
        .close-btn {
            background: none;
            border: none;
            padding: 6px;
            border-radius: 9999px;
            color: #94a3b8;
            cursor: pointer;
        }
        .close-btn:active {
            background-color: #f1f5f9;
        }
        .drawer-nav {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-grow: 1;
        }
        .nav-item {
            width: 100%;
            border: none;
            background: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-item.active {
            background-color: #fef3c7;
            color: #d97706;
        }
        .nav-item:not(.active):active {
            background-color: #f8fafc;
        }
        .badge {
            background-color: #ef4444;
            color: #ffffff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 9999px;
        }
        .drawer-footer {
            padding: 16px;
            border-top: 1px solid #f1f5f9;
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
        }

        /* 3. 主体内容与页面控制 */
        main {
            flex-grow: 1;
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            padding: 16px;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        /* 4. 点菜页面设计 */
        .table-lock-section {
            background-color: #ffffff;
            border: 1px solid #f1f5f9;
            border-radius: 16px;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 24px;
        }
        .table-input-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
        }
        .table-input-wrap span {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            white-space: nowrap;
        }
        .table-input {
            width: 100%;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
            outline: none;
            transition: all 0.2s;
        }
        .table-input:focus {
            border-color: #f59e0b;
            background-color: #ffffff;
        }
        .table-input:disabled {
            background-color: #f1f5f9;
            color: #94a3b8;
            border-color: #e2e8f0;
        }
        .lock-btn {
            background-color: #0f172a;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .lock-btn.locked {
            background-color: #d97706;
        }

        /* 菜品分类区域与左右滑动卡片 */
        .category-section {
            margin-bottom: 24px;
        }
        .category-title-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .category-indicator {
            width: 4px;
            height: 16px;
            background-color: #f59e0b;
            border-radius: 9999px;
        }
        .category-title {
            font-size: 15px;
            font-weight: 800;
            color: #1e293b;
        }
        .dish-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 6px;
            scroll-snap-type: x mandatory;
        }
        .dish-card {
            background-color: #ffffff;
            min-width: 135px;
            max-width: 135px;
            height: 140px;
            border: 1px solid #f1f5f9;
            border-radius: 16px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            scroll-snap-align: start;
            flex-shrink: 0;
            position: relative;
        }
        .dish-info h4 {
            font-size: 13px;
            font-weight: 800;
            color: #1e293b;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .dish-info p {
            font-size: 13px;
            font-weight: 900;
            color: #d97706;
        }
        .dish-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
        }
        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
        }
        .qty-minus {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #64748b;
        }
        .qty-plus {
            background-color: #f59e0b;
            color: #ffffff;
        }
        .qty-num {
            font-size: 13px;
            font-weight: 700;
            color: #334155;
            min-width: 14px;
            text-align: center;
        }

        /* 5. 悬浮购物车按钮 */
        .cart-float-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 40;
            background-color: #f59e0b;
            color: #ffffff;
            width: 56px;
            height: 56px;
            border-radius: 9999px;
            box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.4);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
        }
        .cart-badge-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            background-color: #ef4444;
            color: #ffffff;
            font-size: 9px;
            font-weight: 800;
            width: 20px;
            height: 20px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ffffff;
        }

        /* 6. 菜台页面与历史页面卡片设计 */
        .page-info-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .page-tip {
            font-size: 12px;
            color: #94a3b8;
        }
        .page-summary {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
        }
        .order-card-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .order-card {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
        }
        .order-card.ready {
            background-color: #f0fdf4;
            border: 2px solid #22c55e;
        }
        .order-card-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 70%;
        }
        .order-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .order-table-title {
            font-size: 16px;
            font-weight: 800;
            color: #0f172a;
        }
        .status-pill {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 6px;
        }
        .status-cooking {
            background-color: #fef3c7;
            color: #d97706;
        }
        .status-served {
            background-color: #dcfce7;
            color: #15803d;
        }
        .order-items-snippet {
            font-size: 12px;
            color: #94a3b8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .order-time {
            font-size: 11px;
            color: #94a3b8;
        }
        .order-card-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .order-count {
            font-size: 13px;
            font-weight: 700;
            color: #475569;
        }
        .order-price {
            font-size: 15px;
            font-weight: 900;
            color: #15803d;
        }

        /* 7. 数据统计页面 */
        .stats-grid {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stats-box {
            border-radius: 16px;
            padding: 16px;
        }
        .stats-box-green {
            background-color: #f0fdf4;
            border: 1px solid #dcfce7;
        }
        .stats-box-indigo {
            background-color: #e0e7ff;
            border: 1px solid #e0e7ff;
        }
        .stats-label {
            font-size: 12px;
            font-weight: 600;
            color: #4b5563;
        }
        .stats-val {
            font-size: 22px;
            font-weight: 900;
            margin-top: 4px;
        }
        .stats-val-green { color: #166534; }
        .stats-val-indigo { color: #3730a3; }

        .rank-card {
            background-color: #ffffff;
            border: 1px solid #f1f5f9;
            border-radius: 16px;
            padding: 20px;
        }
        .rank-header {
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
            margin-bottom: 14px;
        }
        .rank-title {
            font-size: 14px;
            font-weight: 800;
            color: #0f172a;
        }
        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 320px;
            overflow-y: auto;
        }
        .rank-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 10px;
            border-bottom: 1px dashed #f1f5f9;
        }
        .rank-item-info h5 {
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
        }
        .rank-item-info p {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 2px;
        }
        .rank-item-qty {
            background-color: #fef3c7;
            color: #b45309;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 8px;
        }
        .export-btn {
            width: 100%;
            background-color: #0f172a;
            color: #ffffff;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 14px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 8. 精美全屏覆盖弹窗框架 */
        .modal {
            position: fixed;
            inset: 0;
            background-color: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-content {
            background-color: #ffffff;
            width: 100%;
            max-width: 480px;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-title h3 {
            font-size: 16px;
            font-weight: 800;
            color: #0f172a;
        }
        .modal-title p {
            font-size: 12px;
            color: #d97706;
            margin-top: 2px;
        }
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .modal-footer {
            padding: 20px 24px;
            border-top: 1px solid #f1f5f9;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 弹窗中的明细项样式 */
        .modal-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 12px;
            border-bottom: 1px solid #f8fafc;
        }
        .modal-item-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .modal-item-title {
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
        }
        .modal-item-price {
            font-size: 12px;
            color: #94a3b8;
        }
        .modal-item-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .modal-item-action {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .action-sm-btn {
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .action-btn-green {
            background-color: #22c55e;
            color: #ffffff;
        }
        .action-btn-red {
            background-color: #fee2e2;
            color: #ef4444;
        }

        /* 9. 信息通知组件 (Toast) */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translate(-50%, 10px);
            z-index: 100;
            background-color: #0f172a;
            color: #ffffff;
            font-size: 12px;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 9999px;
            pointer-events: none;
            transition: all 0.3s ease;
            opacity: 0;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .toast.show {
            transform: translate(-50%, 0);
            opacity: 1;
        }

        /* 10. ⚠️ 完美居中的弹窗框架 (支持清空确认、导出数据) */
        .center-modal {
            position: fixed;
            inset: 0;
            background-color: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .center-modal-content {
            background-color: #ffffff;
            width: 100%;
            max-width: 340px;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: scale(0.95);
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .pwd-title-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ef4444;
        }
        .pwd-desc {
            font-size: 12px;
            color: #64748b;
            line-height: 1.5;
        }
        .pwd-input {
            width: 100%;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px;
            font-size: 14px;
            color: #0f172a;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .pwd-input:focus {
            border-color: #ef4444;
        }
        .btn-row {
            display: flex;
            gap: 8px;
        }
        .btn-row button {
            flex: 1;
            border: none;
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-cancel {
            background-color: #f1f5f9;
            color: #475569;
        }
        .btn-confirm {
            background-color: #ef4444;
            color: #ffffff;
        }

        /* 11. ⚠️ 抛物线飞入购物车粒子样式 (加大、加慢且带金光特效) */
        .fly-particle {
            position: fixed;
            background-color: #f59e0b;
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.8), 0 0 4px rgba(251, 191, 36, 0.5);
            transition: transform 0.9s cubic-bezier(0.1, 0.8, 0.25, 1), 
                        left 0.9s linear, 
                        top 0.9s cubic-bezier(0.5, -0.5, 1, 1), 
                        opacity 0.9s ease;
        }

        @keyframes bounce-cart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .cart-bounce {
            animation: bounce-cart 0.3s ease-out;
        }
    </style>
</head>
<body>

    <!-- 顶部导航栏 -->
    <header>
        <div class="header-left">
            <button id="menu-btn" class="menu-btn tap-feedback">
                <i data-lucide="menu"></i>
            </button>
            <h1 id="page-title" class="page-title">点菜开单</h1>
        </div>
        <div id="header-action-container">
            <!-- 动态清空历史按钮位置 -->
        </div>
    </header>

    <!-- 侧边抽屉布局 (Drawer) -->
    <div id="drawer-overlay" class="drawer-overlay"></div>
    <aside id="drawer" class="drawer">
        <div>
            <div class="drawer-header">
                <div class="brand">
                    <div class="brand-icon">
                        <i data-lucide="utensils-crossed" style="width: 18px; height: 18px;"></i>
                    </div>
                    <span class="brand-name">极简餐掌柜</span>
                </div>
                <button id="close-drawer-btn" class="close-btn">
                    <i data-lucide="x" style="width: 18px; height: 18px;"></i>
                </button>
            </div>
            <nav class="drawer-nav">

                        <span class="category-indicator"></span>

                    </div>
                `;

                const scrollContainer = document.createElement("div");
                scrollContainer.className = "dish-scroll no-scrollbar";

                categoryObj.items.forEach(item => {
                    const card = document.createElement("div");
                    card.className = "dish-card card-shadow";
                    card.innerHTML = `
                        <div class="dish-info">
                            <h4>${item.name}</h4>
                            <p>¥${item.price}/${item.unit}</p>
                        </div>
                        <div class="dish-controls">

                                <i data-lucide="minus" style="width: 12px; height: 12px;"></i>
                            </button>
                            <span id="qty-${item.id}" class="qty-num">0</span>
                            <button onclick="changeQty('${item.id}', 1, event)" class="qty-btn qty-plus tap-feedback">
                                <i data-lucide="plus" style="width: 12px; height: 12px;"></i>
                            </button>
                        </div>
                    `;
                    scrollContainer.appendChild(card);
                });

                categoryDiv.appendChild(scrollContainer);
                menuContainer.appendChild(categoryDiv);
            });
        }

        function changeQty(itemId, val, event) {
            const currentQty = currentCart[itemId] || 0;
            const newQty = Math.max(0, currentQty + val);
            
            if (newQty === 0) delete currentCart[itemId];
            else currentCart[itemId] = newQty;

            const qtyElement = document.getElementById(`qty-${itemId}`);
            if (qtyElement) {
                qtyElement.innerText = newQty;
                if (val > 0) {
                    qtyElement.classList.remove("pop-active");
                    void qtyElement.offsetWidth; 
                    qtyElement.classList.add("pop-active");
                    
                    // 飞入购物车粒子过渡
                    createFlyingBubble(event);
                }
            }
            updateFloatingCart();
        }

        // ⚠️ 慢速、大尺寸、发光的 3D 抛物线飞入算法
        function createFlyingBubble(e) {
            const button = e.currentTarget;
            const btnRect = button.getBoundingClientRect();
            const cartBtn = document.getElementById("cart-float-btn");
            const cartRect = cartBtn.getBoundingClientRect();

            const bubble = document.createElement("div");
            bubble.className = "fly-particle";
            // 粒子放大为 24px * 24px
            bubble.style.width = "24px";
            bubble.style.height = "24px";
            bubble.style.left = `${btnRect.left + btnRect.width / 2 - 12}px`;
            bubble.style.top = `${btnRect.top + btnRect.height / 2 - 12}px`;
            document.body.appendChild(bubble);

            // 触发更缓慢、优美的抛物位移
            setTimeout(() => {
                const targetX = cartRect.left + cartRect.width / 2 - 12;
                const targetY = cartRect.top + cartRect.height / 2 - 12;
                
                bubble.style.transform = `translate(${targetX - (btnRect.left + btnRect.width / 2 - 12)}px, ${targetY - (btnRect.top + btnRect.height / 2 - 12)}px) scale(0.3)`;
                bubble.style.opacity = "0.15";
            }, 20);

            bubble.addEventListener("transitionend", () => {
                bubble.remove();
                cartBtn.classList.remove("cart-bounce");
                void cartBtn.offsetWidth;
                cartBtn.classList.add("cart-bounce");
            });
        }

        function getItemDetails(itemId) {
            for (let cat of MENU_DATA) {
                const found = cat.items.find(i => i.id === itemId);
                if (found) return found;
            }
            return null;
        }

        function updateFloatingCart() {
            let totalQty = 0;
            for (let id in currentCart) totalQty += currentCart[id];
            const cartBadge = document.getElementById("cart-badge");
            if (totalQty > 0) {
                cartBadge.innerText = totalQty;
                cartBadge.style.display = "flex";
            } else {
                cartBadge.style.display = "none";
            }
        }

                setTimeout(() => content.style.transform = "translateY(0)", 10);
            } else {
                content.style.transform = "translateY(100%)";
                setTimeout(() => modal.style.display = "none", 300);
            }
        }

        function renderCartModalItems() {
            const container = document.getElementById("cart-items-list");
            container.innerHTML = "";

            const tableInputVal = document.getElementById("table-number-input").value.trim();
            document.getElementById("cart-table-info").innerText = tableInputVal ? `就餐桌号: ${tableInputVal} 号桌 ${isTableLocked ? '(已锁定)' : '(未锁定)'}` : "请先确定并锁定桌号";

            let totalQty = 0, totalPrice = 0;
            const cartKeys = Object.keys(currentCart);

            if (cartKeys.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 32px 0; color: #94a3b8; display: flex; flex-direction: column; align-items: center; gap: 8px;">
                        <i data-lucide="shopping-cart" style="width: 36px; height: 36px;"></i>
                        <span style="font-size: 12px;">购物车空空如也~</span>
                    </div>
                `;
            } else {
                cartKeys.forEach(itemId => {
                    const item = getItemDetails(itemId);
                    if (!item) return;
                    const qty = currentCart[itemId];
                    const subtotal = item.price * qty;
                    totalQty += qty;
                    totalPrice += subtotal;

                    const div = document.createElement("div");
                    div.className = "modal-item";
                    div.innerHTML = `
                        <div class="modal-item-left">
                            <span class="modal-item-title">${item.name}</span>
                            <span class="modal-item-price">单价 ¥${item.price} / ${item.unit}</span>
                        </div>
                        <div class="modal-item-right">
                            <div class="modal-item-action">
                                <button onclick="changeQty('${itemId}', -1, event); renderCartModalItems();" class="qty-btn qty-minus" style="width: 24px; height: 24px;"><i data-lucide="minus" style="width: 10px; height: 10px;"></i></button>
                                <span class="qty-num">${qty}</span>
                                <button onclick="changeQty('${itemId}', 1, event); renderCartModalItems();" class="qty-btn qty-plus" style="width: 24px; height: 24px;"><i data-lucide="plus" style="width: 10px; height: 10px;"></i></button>
                            </div>
                            <span style="font-size: 14px; font-weight: 800; color: #1e293b; min-width: 50px; text-align: right;">¥${subtotal}</span>
                        </div>
                    `;
                    container.appendChild(div);
                });
            }
            document.getElementById("cart-total-price").innerText = `${totalQty} 件 / ¥${totalPrice.toFixed(1)}`;
            lucide.createIcons();
        }

        function submitOrder() {
            const tableNo = document.getElementById("table-number-input").value.trim();
            if (!tableNo || !isTableLocked) {
                showToast("⚠️ 请先确定并锁餐桌号！");
                return;
            }

            const cartKeys = Object.keys(currentCart);
            if (cartKeys.length === 0) {
                showToast("⚠️ 请至少点一个菜！");
                return;
            }

            const orderId = "order_" + Date.now();
            const orderItems = cartKeys.map(itemId => {
                const original = getItemDetails(itemId);
                return { id: itemId, name: original.name, price: original.price, qty: currentCart[itemId], unit: original.unit, status: 'cooking' };
            });

            activeOrders.push({
                id: orderId,
                tableNo: tableNo,
                timestamp: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
                items: orderItems,
                billed: false
            });

            currentCart = {};
            isTableLocked = false;
            const input = document.getElementById("table-number-input");
            input.value = "";
            input.disabled = false;
            
            const btn = document.getElementById("lock-table-btn");
            btn.innerHTML = `<i data-lucide="lock" style="width: 14px; height: 14px;"></i><span>确定桌号</span>`;
            btn.classList.remove("locked");

            document.querySelectorAll(".qty-num").forEach(el => el.innerText = "0");

            saveState();
            updateFloatingCart();
            toggleCartModal(false);
            showToast("🎉 下单成功！已自动转至菜台");

            setTimeout(() => { switchPage('kitchen'); }, 250);
        }

        // --- 2. 菜台页面模块 ---
        function renderKitchenPage() {
            const container = document.getElementById("kitchen-list");
            container.innerHTML = "";

            if (activeOrders.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 48px 0; color: #94a3b8; background-color: #ffffff; border-radius: 16px; border: 1px dashed #e2e8f0; display: flex; flex-direction: column; align-items: center; gap: 10px;">
                        <i data-lucide="chef-hat" style="width: 48px; height: 48px;"></i>
                        <span style="font-size: 13px;">没有进行中的账单</span>
                    </div>
                `;
                document.getElementById("kitchen-total-info").innerText = "共 0 桌未结账";
                return;
            }

            document.getElementById("kitchen-total-info").innerText = `共 ${activeOrders.length} 桌未结账`;

            activeOrders.forEach(order => {
                const isAllServed = order.items.every(item => item.status === 'served' || item.status === 'canceled');
                const totalCount = order.items.reduce((sum, item) => sum + item.qty, 0);
                const servedCount = order.items.reduce((sum, item) => sum + ((item.status === 'served' || item.status === 'canceled') ? item.qty : 0), 0);

                const card = document.createElement("div");
                card.onclick = () => openOrderDetail(order.id, 'kitchen');
                
                if (isAllServed) {
                    card.className = "order-card ready";
                } else {
                    card.className = "order-card card-shadow";
                }

                card.innerHTML = `
                    <div class="order-card-left">
                        <div class="order-card-header">
                            <span class="order-table-title">${order.tableNo} 号桌</span>
                            ${isAllServed ? `<span class="status-pill status-served">菜已上齐</span>` : `<span class="status-pill status-cooking">正在制作</span>`}
                        </div>
                        <p class="order-items-snippet">${order.items.map(item => `${item.name}x${item.qty}`).join(", ")}</p>
                        <p class="order-time">下单时间: ${order.timestamp}</p>
                    </div>
                    <div class="order-card-right">
                        <span class="order-count">${servedCount}/${totalCount} 菜品</span>
                        <span class="order-price">¥${calcOrderTotal(order)}</span>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function calcOrderTotal(order) {
            return order.items.reduce((sum, item) => {
                if (item.status === 'canceled') return sum;
                return sum + (item.price * item.qty);
            }, 0).toFixed(1);
        }

        function openOrderDetail(orderId, originPage) {
            const order = (originPage === 'kitchen') ? activeOrders.find(o => o.id === orderId) : historyOrders.find(o => o.id === orderId);
            if (!order) return;
            currentDetailOrder = order;
            toggleDetailModal(true, originPage);
        }

        function toggleDetailModal(show, originPage = 'kitchen') {
            const modal = document.getElementById("detail-modal");
            const content = document.getElementById("detail-modal-content");
            if (show && currentDetailOrder) {
                renderDetailModalItems(originPage);
                modal.style.display = "flex";
                setTimeout(() => content.style.transform = "translateY(0)", 10);
            } else {
                content.style.transform = "translateY(100%)";
                setTimeout(() => modal.style.display = "none", 300);
            }
        }

        function renderDetailModalItems(originPage) {
            const order = currentDetailOrder;
            const isKitchen = originPage === 'kitchen';
            
            document.getElementById("detail-table").innerText = `${order.tableNo} 号桌`;
            document.getElementById("detail-time").innerText = `下单时间: ${order.timestamp}`;

            const tag = document.getElementById("detail-tag-status");
            const isAllServed = order.items.every(item => item.status === 'served' || item.status === 'canceled');
            if (order.billed) {
                tag.className = "status-pill status-served";
                tag.style.backgroundColor = "#e2e8f0";
                tag.style.color = "#475569";
                tag.innerText = "已结账";
            } else if (isAllServed) {
                tag.className = "status-pill status-served";
                tag.innerText = "全部上齐";
            } else {
                tag.className = "status-pill status-cooking";
                tag.innerText = "有菜未上";
            }

            const container = document.getElementById("detail-items-list");
            container.innerHTML = "";

            order.items.forEach((item, index) => {
                const itemDiv = document.createElement("div");
                itemDiv.className = "modal-item";
                
                let badge = "";
                let nameStyle = "font-weight: 700; color: #1e293b;";
                if (item.status === 'served') {
                    badge = `<span class="status-pill status-served" style="font-size: 9px; padding: 1px 4px;">已上</span>`;
                    nameStyle = "color: #94a3b8; text-decoration: line-through;";
                } else if (item.status === 'canceled') {
                    badge = `<span class="status-pill status-cooking" style="background-color: #fee2e2; color: #ef4444; font-size: 9px; padding: 1px 4px;">取消</span>`;
                    nameStyle = "color: #94a3b8; text-decoration: line-through;";
                } else {
                    badge = `<span class="status-pill status-cooking" style="font-size: 9px; padding: 1px 4px;">制作中</span>`;
                }

                itemDiv.innerHTML = `
                    <div class="modal-item-left">
                        <div style="display: flex; align-items: center; gap: 6px;">
                            <span style="${nameStyle}">${item.name}</span>
                            ${badge}
                        </div>
                        <span class="modal-item-price">单价 ¥${item.price} / 数量 ${item.qty} ${item.unit}</span>
                    </div>
                    <div class="modal-item-right">
                        ${(isKitchen && item.status === 'cooking') ? `
                            <button onclick="markItemStatus('${order.id}', ${index}, 'served')" class="action-sm-btn action-btn-green tap-feedback"><i data-lucide="check" style="width: 12px; height: 12px;"></i>上菜</button>
                            <button onclick="markItemStatus('${order.id}', ${index}, 'canceled')" class="action-sm-btn action-btn-red tap-feedback" style="background-color: #fee2e2; color: #ef4444;"><i data-lucide="ban" style="width: 12px; height: 12px;"></i>取消</button>
                        ` : ''}
                    </div>
                `;
                container.appendChild(itemDiv);
            });

            const footerContainer = document.getElementById("detail-footer-btn-container");
            footerContainer.innerHTML = "";

            if (isKitchen) {
                const totalAmt = calcOrderTotal(order);
                const isReadyToBill = order.items.every(item => item.status === 'served' || item.status === 'canceled');
                const btn = document.createElement("button");
                btn.onclick = () => performCheckout(order.id);
                btn.style.width = "100%";
                btn.style.color = "#ffffff";
                btn.style.border = "none";
                btn.style.borderRadius = "12px";
                btn.style.padding = "14px";
                btn.style.fontWeight = "700";
                btn.style.cursor = "pointer";
                btn.style.display = "flex";
                btn.style.alignItems = "center";
                btn.style.justifyContent = "center";
                btn.style.gap = "8px";
                btn.className = "tap-feedback";
                
                if (isReadyToBill) {
                    btn.style.backgroundColor = "#22c55e";
                    btn.innerHTML = `<i data-lucide="wallet" style="width: 16px; height: 16px;"></i>完成上菜·买单结账 (¥${totalAmt})`;
                } else {
                    btn.style.backgroundColor = "#ef4444";
                    btn.innerHTML = `<i data-lucide="alert-triangle" style="width: 16px; height: 16px;"></i>未上齐菜·强制买单 (¥${totalAmt})`;
                }
                footerContainer.appendChild(btn);
            } else {
                footerContainer.innerHTML = `
                    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%; font-size: 13px; font-weight: 700;">
                        <span style="color: #64748b;">实付金额:</span>
                        <span style="font-size: 18px; font-weight: 900; color: #15803d;">¥${calcOrderTotal(order)}</span>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function markItemStatus(orderId, itemIndex, targetStatus) {
            const order = activeOrders.find(o => o.id === orderId);
            if (!order) return;
            order.items[itemIndex].status = targetStatus;
            saveState();
            renderDetailModalItems('kitchen');
            renderKitchenPage();
            showToast(targetStatus === 'served' ? "✅ 菜品标记已上" : "🚫 菜品标记取消");
        }

        function performCheckout(orderId) {
            const orderIndex = activeOrders.findIndex(o => o.id === orderId);
            if (orderIndex === -1) return;

            const order = activeOrders[orderIndex];
            order.billed = true;
            activeOrders.splice(orderIndex, 1);
            historyOrders.push(order);
            
            saveState();
            toggleDetailModal(false);
            renderKitchenPage();
            showToast("🎉 账单成功结账，已推入历史！");
        }

        // --- 3. 历史菜单模块 ---
        function renderHistoryPage() {
            const container = document.getElementById("history-list");
            container.innerHTML = "";

            if (historyOrders.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 48px 0; color: #94a3b8; background-color: #ffffff; border-radius: 16px; border: 1px dashed #e2e8f0; display: flex; flex-direction: column; align-items: center; gap: 10px;">
                        <i data-lucide="history" style="width: 48px; height: 48px;"></i>
                        <span style="font-size: 13px;">暂无已结账的历史账单</span>
                    </div>
                `;
                document.getElementById("history-total-info").innerText = "共 0 笔历史";
                return;
            }

            document.getElementById("history-total-info").innerText = `共 ${historyOrders.length} 笔历史`;
            const reversedHistory = [...historyOrders].reverse();

            reversedHistory.forEach(order => {
                const totalAmt = calcOrderTotal(order);
                const itemsStr = order.items.map(item => `${item.name}x${item.qty}`).join(", ");

                const card = document.createElement("div");
                card.onclick = () => openOrderDetail(order.id, 'history');
                card.className = "order-card card-shadow";
                card.innerHTML = `
                    <div class="order-card-left">
                        <div class="order-card-header">
                            <span class="order-table-title">${order.tableNo} 号桌</span>
                            <span class="status-pill" style="background-color: #f1f5f9; color: #475569;">已结账</span>
                        </div>
                        <p class="order-items-snippet">${itemsStr}</p>
                        <p class="order-time">${order.timestamp}</p>
                    </div>
                    <div class="order-card-right">
                        <span class="order-price">¥${totalAmt}</span>
                    </div>
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        // --- 4. 密码保护的清空历史模块 (完美居中控制) ---
        function clearAllHistory() {
            togglePasswordModal(true);
        }

        function togglePasswordModal(show) {
            const modal = document.getElementById("password-modal");
            const content = document.getElementById("password-modal-content");
            const input = document.getElementById("admin-password-input");
            if (show) {
                input.value = "";
                modal.style.display = "flex";
                setTimeout(() => content.style.transform = "scale(1)", 10);
            } else {
                content.style.transform = "scale(0.95)";
                setTimeout(() => modal.style.display = "none", 200);
            }
        }

        function verifyAndClearHistory() {
            const inputVal = document.getElementById("admin-password-input").value;
            if (inputVal === ADMIN_PASSWORD) {
                historyOrders = [];
                localStorage.setItem("kitchen_history_orders", JSON.stringify([]));
                renderHistoryPage();
                togglePasswordModal(false);
                showToast("🗑️ 历史账单已安全清空！");
            } else {
                showToast("❌ 密码错误，无权清空历史数据！");
            }
        }

        // --- 5. 统计及带单位导出模块 (完美居中控制) ---
        function renderStatsPage() {
            const totalRevenue = historyOrders.reduce((sum, o) => sum + parseFloat(calcOrderTotal(o)), 0).toFixed(1);
            document.getElementById("stats-total-revenue").innerText = `¥${totalRevenue}`;
            document.getElementById("stats-total-tables").innerText = `${historyOrders.length} 桌`;

            const itemCounts = {};
            historyOrders.forEach(order => {
                order.items.forEach(item => {
                    if (item.status === 'canceled') return;
                    if (!itemCounts[item.name]) {
                        itemCounts[item.name] = { qty: 0, price: item.price, unit: item.unit || "份" };
                    }
                    itemCounts[item.name].qty += item.qty;
                });
            });

            const sortedItems = Object.keys(itemCounts).map(name => {
                return { name: name, qty: itemCounts[name].qty, price: itemCounts[name].price, unit: itemCounts[name].unit };
            }).sort((a, b) => b.qty - a.qty);

            const container = document.getElementById("stats-items-list");
            container.innerHTML = "";

            if (sortedItems.length === 0) {
                container.innerHTML = `<div style="text-align: center; padding: 32px 0; font-size: 12px; color: #94a3b8;">暂无历史结账数据，无法销量统计</div>`;
                return;
            }

            sortedItems.forEach(item => {
                const subtotal = (item.price * item.qty).toFixed(1);
                const div = document.createElement("div");
                div.className = "rank-item";
                div.innerHTML = `
                    <div class="rank-item-info">
                        <h5>${item.name}</h5>
                        <p>单价 ¥${item.price} / 累计额 ¥${subtotal}</p>
                    </div>
                    <span class="rank-item-qty">已售 ${item.qty} ${item.unit}</span>
                `;
                container.appendChild(div);
            });
        }

        function showExportModal() {
            const itemCounts = {};
            historyOrders.forEach(order => {
                order.items.forEach(item => {
                    if (item.status === 'canceled') return;
                    if (!itemCounts[item.name]) {
                        itemCounts[item.name] = { qty: 0, price: item.price, unit: item.unit || "份" };
                    }
                    itemCounts[item.name].qty += item.qty;
                });
            });

            // 导出格式：[价格][菜名]：[数量][单位]
            let outputLines = [];
            Object.keys(itemCounts).forEach(name => {
                const price = itemCounts[name].price;
                const qty = itemCounts[name].qty;
                const unit = itemCounts[name].unit;
                outputLines.push(`${price}${name}：${qty}${unit}`);
            });

            const outputText = outputLines.join("\n");
            document.getElementById("export-text-area").value = outputText || "暂无历史销量数据";
            
            // ⚠️ 居中控制显示
            const modal = document.getElementById("export-modal");
            const content = document.getElementById("export-modal-content");
            modal.style.display = "flex";
            setTimeout(() => content.style.transform = "scale(1)", 10);
        }

        function toggleExportModal(show) {
            const modal = document.getElementById("export-modal");
            const content = document.getElementById("export-modal-content");
            if (show) {
                modal.style.display = "flex";
                setTimeout(() => content.style.transform = "scale(1)", 10);
            } else {
                content.style.transform = "scale(0.95)";
                setTimeout(() => modal.style.display = "none", 200);
            }
        }

        function copyExportText() {
            const textArea = document.getElementById("export-text-area");
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("📋 带有单位的数据文本已成功复制！");
                toggleExportModal(false);
            } catch (err) {
                showToast("⚠️ 复制失败，请手动选择复制。");
            }
        }

        function updateBadgeCounts() {
            const count = activeOrders.length;
            const badge = document.getElementById("badge-kitchen-count");
            if (count > 0) {
                badge.innerText = count;
                badge.style.display = "inline-block";
            } else {
                badge.style.display = "none";
            }
        }
    </script>
</body>
</html>
